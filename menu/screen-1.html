<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3600" />
  <title>Khyber Menu - Screen 1</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    img {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    img.active {
      opacity: 1;
    }
  </style>
</head>
<body>

<img id="img1" class="active" src="images/screen1-1.jpg" />
<img id="img2" src="images/screen1-2.jpg" />

<script>
  const images = [
    "images/screen1-1.jpg",
    "images/screen1-2.jpg"
  ];

  let index = 0;
  const delay = 12000;

  const imgA = document.getElementById("img1");
  const imgB = document.getElementById("img2");

  let showingA = true;

  setInterval(() => {
    index = (index + 1) % images.length;

    const nextSrc = images[index] + "?v=" + Date.now();

    if (showingA) {
      imgB.src = nextSrc;
      imgB.classList.add("active");
      imgA.classList.remove("active");
    } else {
      imgA.src = nextSrc;
      imgA.classList.add("active");
      imgB.classList.remove("active");
    }

    showingA = !showingA;
  }, delay);
</script>

</body>
</html>
