<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3600" />
  <title>Khyber Menu - Screen 3</title>

  <style>
    html, body, * {
      cursor: none !important;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    img.active {
      opacity: 1;
    }
  </style>
</head>
<body>

<img id="img1" class="active" src="images/screen3-1.jpg" alt="Khyber Menu Screen 3A" />
<img id="img2" src="images/screen3-2.jpg" alt="Khyber Menu Screen 3B" />

<script>
  const images = [
    "images/screen3-1.jpg",
    "images/screen3-2.jpg"
  ];

  let index = 0;
  const delay = 12000;

  const imgA = document.getElementById("img1");
  const imgB = document.getElementById("img2");

  let showingA = true;

  setInterval(() => {
    index = (index + 1) % images.length;
    const nextSrc = images[index] + "?v=" + Date.now();

    if (showingA) {
      imgB.src = nextSrc;
      imgB.classList.add("active");
      imgA.classList.remove("active");
    } else {
      imgA.src = nextSrc;
      imgA.classList.add("active");
      imgB.classList.remove("active");
    }

    showingA = !showingA;
  }, delay);

  let hideTimer;

  function hideCursor() {
    document.body.style.cursor = "none";
    document.documentElement.style.cursor = "none";
  }

  function showCursorTemporarily() {
    document.body.style.cursor = "default";
    document.documentElement.style.cursor = "default";

    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideCursor, 1500);
  }

  document.addEventListener("mousemove", showCursorTemporarily);
  document.addEventListener("click", showCursorTemporarily);
  document.addEventListener("keydown", hideCursor);

  hideCursor();
</script>

</body>
</html>
