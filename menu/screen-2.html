<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3600" />
  <title>Khyber Menu - Screen 2</title>

  <style>
    html, body, * {
      cursor: none !important;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    img {
      position: absolute;
      top: 0.5vh;
      left: 0.5vw;
      width: 99vw;
      height: 99vh;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

<img src="images/screen2-1.jpg?v=1" />

<script>
  let hideTimer;

  function hideCursor() {
    document.body.style.cursor = "none";
  }

  function showCursorTemporarily() {
    document.body.style.cursor = "default";
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideCursor, 1500);
  }

  document.addEventListener("mousemove", showCursorTemporarily);
  document.addEventListener("click", showCursorTemporarily);

  hideCursor();
</script>

</body>
</html>
