  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>Khyber Menu Screen</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
    }

    img.active {
      opacity: 1;
    }
  </style>
</head>
<body>

<img id="imgA" class="active" />
<img id="imgB" />

<script>
  const params = new URLSearchParams(window.location.search);
  const screenNumber = params.get("screen") || "1";

  let images = [];
  let index = 0;
  let showingA = true;
  let delay = 12000;
  let refresh = 3600000;
  let slideTimer;

  const imgA = document.getElementById("imgA");
  const imgB = document.getElementById("imgB");

  async function loadConfig() {
    try {
      const response = await fetch("config.json?v=" + Date.now());
      const config = await response.json();

      delay = config.delay || 12000;
      refresh = config.refresh || 3600000;
      images = config.screens[screenNumber] || config.screens["1"];

      if (!images || images.length === 0) {
        document.body.innerHTML = "";
        return;
      }

      imgA.src = images[0] + "?v=" + Date.now();

      clearInterval(slideTimer);
      slideTimer = setInterval(nextSlide, delay);

      setTimeout(() => {
        location.reload();
      }, refresh);

    } catch (error) {
      console.error("Menu config failed to load:", error);
    }
  }

  function nextSlide() {
    if (!images || images.length <= 1) return;

    index = (index + 1) % images.length;
    const nextSrc = images[index] + "?v=" + Date.now();

    if (showingA) {
      imgB.src = nextSrc;
      imgB.classList.add("active");
      imgA.classList.remove("active");
    } else {
      imgA.src = nextSrc;
      imgA.classList.add("active");
      imgB.classList.remove("active");
    }

    showingA = !showingA;
  }

  loadConfig();
</script>

</body>
</html>
